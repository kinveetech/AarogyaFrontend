name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz \
            | tar xz -C /usr/local/bin gitleaks

      - name: Scan for secrets
        run: gitleaks detect --source . --log-opts="origin/main..HEAD" --verbose

  changes:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      source: ${{ steps.filter.outputs.source }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect source file changes
        id: filter
        env:
          BASE_REF: ${{ github.base_ref }}
          EVENT_BEFORE: ${{ github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
        shell: bash
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            BASE="origin/$BASE_REF"
          else
            BASE="$EVENT_BEFORE"
          fi

          CHANGES=$(git diff --name-only "$BASE"...HEAD 2>/dev/null || git diff --name-only "$BASE" HEAD)

          if echo "$CHANGES" | grep -qE '^(src/|public/|package\.json$|package-lock\.json$|tsconfig\.json$|next\.config\.|\.eslintrc|vitest\.|playwright\.|\.github/workflows/ci\.yml$)'; then
            echo "source=true" >> "$GITHUB_OUTPUT"
            echo "Detected source file changes."
          else
            echo "source=false" >> "$GITHUB_OUTPUT"
            echo "No source file changes detected. Changed files:"
            echo "$CHANGES"
          fi

  ci:
    needs: changes
    if: >-
      always() &&
      (github.event_name == 'workflow_dispatch' || needs.changes.outputs.source == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test with coverage
        run: npm run test:coverage

      - name: Audit dependencies
        run: npm audit --audit-level=critical --omit=dev

      - name: Build
        run: npm run build
        env:
          AUTH_SECRET: ci-test-secret-do-not-use-in-production
          COGNITO_DOMAIN: https://auth.ci-placeholder.example.com
          COGNITO_ISSUER: https://cognito-idp.us-east-1.amazonaws.com/us-east-1_placeholder
          COGNITO_CLIENT_ID: ci-placeholder-client-id
          COGNITO_CLIENT_SECRET: ci-placeholder-client-secret
          API_URL: https://api.ci-placeholder.example.com

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test --project=chromium
        env:
          AUTH_SECRET: ci-test-secret-do-not-use-in-production
          COGNITO_DOMAIN: https://auth.ci-placeholder.example.com
          COGNITO_ISSUER: https://cognito-idp.us-east-1.amazonaws.com/us-east-1_placeholder
          COGNITO_CLIENT_ID: ci-placeholder-client-id
          COGNITO_CLIENT_SECRET: ci-placeholder-client-secret
          API_URL: https://api.ci-placeholder.example.com

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload E2E test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-results
          path: test-results/junit.xml
          retention-days: 14

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9 # v7.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarCloud quality gate
        uses: SonarSource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b # v1.2.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  ci-status:
    if: always()
    needs: [secrets-scan, changes, ci]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check required jobs
        env:
          SOURCE_CHANGED: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.source == 'true' }}
          CI_RESULT: ${{ needs.ci.result }}
          SECRETS_RESULT: ${{ needs.secrets-scan.result }}
        run: |
          if [[ "$SECRETS_RESULT" != "success" ]]; then
            echo "Secrets scan failed — potential credentials in code."
            exit 1
          fi
          if [[ "$SOURCE_CHANGED" != "true" ]]; then
            echo "No source file changes — CI skipped."
            exit 0
          fi
          if [[ "$CI_RESULT" != "success" ]]; then
            echo "CI failed: $CI_RESULT"
            exit 1
          fi
          echo "All checks passed."
