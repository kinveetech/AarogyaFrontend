name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test with coverage
        run: npm run test:coverage

      - name: Audit dependencies
        run: npm audit --audit-level=critical --omit=dev

      - name: Build
        run: npm run build
        env:
          AUTH_SECRET: ci-test-secret-do-not-use-in-production
          COGNITO_DOMAIN: https://auth.ci-placeholder.example.com
          COGNITO_ISSUER: https://cognito-idp.us-east-1.amazonaws.com/us-east-1_placeholder
          COGNITO_CLIENT_ID: ci-placeholder-client-id
          COGNITO_CLIENT_SECRET: ci-placeholder-client-secret
          API_URL: https://api.ci-placeholder.example.com

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test --project=chromium
        env:
          AUTH_SECRET: ci-test-secret-do-not-use-in-production
          COGNITO_DOMAIN: https://auth.ci-placeholder.example.com
          COGNITO_ISSUER: https://cognito-idp.us-east-1.amazonaws.com/us-east-1_placeholder
          COGNITO_CLIENT_ID: ci-placeholder-client-id
          COGNITO_CLIENT_SECRET: ci-placeholder-client-secret
          API_URL: https://api.ci-placeholder.example.com

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload E2E test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v6
        with:
          name: e2e-test-results
          path: test-results/junit.xml
          retention-days: 14

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9 # v7.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarCloud quality gate
        uses: SonarSource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b # v1.2.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
