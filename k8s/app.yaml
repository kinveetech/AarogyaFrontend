apiVersion: v1
kind: Secret
metadata:
  name: frontend-secret
  namespace: aarogya-frontend
type: Opaque
stringData:
  AUTH_SECRET: "PLACEHOLDER_REPLACED_BY_CD"
  COGNITO_CLIENT_ID: "REPLACE_WITH_WEB_CLIENT_ID"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aarogya-frontend
  namespace: aarogya-frontend
  labels:
    app: aarogya-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aarogya-frontend
  template:
    metadata:
      labels:
        app: aarogya-frontend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: aarogya-frontend
          image: ghcr.io/kinveetech/aarogyafrontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: frontend-secret
                  key: AUTH_SECRET
            - name: AUTH_URL
              value: "https://dev.kinvee.in"
            - name: API_URL
              value: "http://aarogya-api.aarogya.svc.cluster.local"
            - name: COGNITO_DOMAIN
              value: "https://aarogya-dev.auth.ap-south-1.amazoncognito.com"
            - name: COGNITO_ISSUER
              value: "https://cognito-idp.ap-south-1.amazonaws.com/ap-south-1_I827gkdF7"
            - name: COGNITO_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: frontend-secret
                  key: COGNITO_CLIENT_ID
            - name: NEXT_PUBLIC_FIREBASE_API_KEY
              value: ""
            - name: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
              value: ""
            - name: NEXT_PUBLIC_FIREBASE_PROJECT_ID
              value: ""
            - name: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
              value: ""
            - name: NEXT_PUBLIC_FIREBASE_APP_ID
              value: ""
            - name: NEXT_PUBLIC_FIREBASE_VAPID_KEY
              value: ""
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: aarogya-frontend
  namespace: aarogya-frontend
  labels:
    app: aarogya-frontend
spec:
  type: ClusterIP
  selector:
    app: aarogya-frontend
  ports:
    - port: 80
      targetPort: 3000
